[main]
font=JetBrains Mono:size=11, Noto Color Emoji:size=11
pad=15x15
term=xterm-256color
selection-target=primary

[cursor]
style=beam
color=282828 ebdbb2
blink=yes
beam-thickness=1.5

[colors]
alpha=0.95
foreground=ebdbb2
background=282828
regular0=282828
regular1=cc241d
regular2=98971a
regular3=d79921
regular4=458588
regular5=b16286
regular6=689d6a
regular7=a89984
bright0=928374
bright1=fb4934
bright2=b8bb26
bright3=fabd2f
bright4=83a598
bright5=d3869b
bright6=8ec07c
bright7=ebdbb2

[scrollback]
lines=10000
indicator-format=percentage
indicator-position=fixed

[url]
launch=xdg-open ${url}
label-letters=sadfjklewcmpgh

[mouse]
hide-when-typing=yes

[csd]
preferred=server
size=0
